<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human Bridges - Division Heatmap</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #181818;
      color: #e0e0e0;
      min-height: 100vh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 700;
    }

    .logo span {
      background: linear-gradient(135deg, #00c853, #69f0ae);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav {
      display: flex;
      gap: 20px;
      font-size: 0.9rem;
    }

    .nav a {
      color: #888;
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav a:hover, .nav a.active {
      color: #fff;
    }

    /* Treemap */
    #treemap {
      width: 100%;
      height: calc(100vh - 120px);
      position: relative;
    }

    .treemap-block {
      position: absolute;
      border: 1px solid rgba(0,0,0,0.5);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .treemap-block:hover {
      border: 2px solid #fff !important;
      z-index: 10;
      transform: scale(1.01);
    }

    .treemap-block .name {
      font-weight: 700;
      font-size: clamp(10px, 2vw, 24px);
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      line-height: 1.2;
      padding: 4px;
    }

    .treemap-block .subs {
      font-size: clamp(8px, 1.2vw, 12px);
      color: rgba(255,255,255,0.8);
      margin-top: 3px;
    }

    /* Category headers in treemap */
    .category-header {
      position: absolute;
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      z-index: 5;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }

    /* Footer */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: #1a1a1a;
      border-top: 1px solid #333;
      font-size: 0.8rem;
      color: #888;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .legend-title {
      color: #666;
    }

    .legend-bar {
      display: flex;
      height: 12px;
      border-radius: 2px;
      overflow: hidden;
    }

    .legend-bar span {
      width: 25px;
      height: 100%;
    }

    .instructions {
      color: #666;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal.active { display: flex; }

    .modal-content {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 25px;
      max-width: 450px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal h3 {
      font-size: 1.4rem;
      margin-bottom: 5px;
    }

    .modal .impact-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 15px;
    }

    .modal-close {
      float: right;
      background: none;
      border: none;
      color: #888;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .modal-close:hover { color: #fff; }

    .sub-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 15px;
    }

    .sub-item {
      background: #2a2a2a;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 0.8rem;
      color: #ccc;
    }

    /* Impact color scale - red for high division */
    .impact-1 { background: #0d3d0d; color: #4caf50; }
    .impact-2 { background: #1a5c1a; color: #66bb6a; }
    .impact-3 { background: #2d7a2d; color: #81c784; }
    .impact-4 { background: #5c3d0d; color: #ffa726; }
    .impact-5 { background: #8b5a0d; color: #ff9800; }
    .impact-6 { background: #8b3a0d; color: #ff5722; }
    .impact-7 { background: #9c1a1a; color: #f44336; }
    .impact-8 { background: #b71c1c; color: #ff1744; }
  </style>
</head>
<body>
  <header>
    <div class="logo"><span>HUMAN</span> BRIDGES</div>
    <nav class="nav">
      <a href="#" class="active">Map</a>
      <a href="#">Groups</a>
      <a href="#">About</a>
    </nav>
  </header>

  <div id="treemap"></div>

  <footer>
    <div class="legend">
      <span class="legend-title">DIVISION INTENSITY:</span>
      <div class="legend-bar">
        <span style="background:#0d3d0d"></span>
        <span style="background:#2d7a2d"></span>
        <span style="background:#5c3d0d"></span>
        <span style="background:#8b3a0d"></span>
        <span style="background:#b71c1c"></span>
      </div>
      <span style="color:#888">Low → High</span>
    </div>
    <div class="instructions">Click any block to see sub-groups</div>
  </footer>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <h3 id="modal-title">Factor</h3>
      <span class="impact-badge" id="modal-impact">Impact: 8</span>
      <p style="color:#888;font-size:0.9rem;" id="modal-desc">sub-groups</p>
      <div class="sub-list" id="modal-subs"></div>
    </div>
  </div>

  <script>
    // Division factors with impact (1-8) and sub-groups
    // Grouped by category
    const data = {
      "IDENTITY": [
        { name: "Race/Ethnicity", impact: 8, subs: ["Asian", "Black", "White", "Latino", "Indigenous", "Middle Eastern", "Mixed"] },
        { name: "Gender Identity", impact: 8, subs: ["Male", "Female", "Non-binary", "Transgender", "Gender Fluid"] },
        { name: "Sexual Orientation", impact: 8, subs: ["Straight", "Gay", "Lesbian", "Bisexual", "Pansexual", "Asexual"] },
        { name: "Age Generation", impact: 6, subs: ["Gen Z", "Millennial", "Gen X", "Boomer", "Silent Gen", "Gen Alpha"] },
        { name: "Physical Appearance", impact: 3, subs: ["Height", "Weight", "Hair Color", "Eye Color", "Style"] }
      ],
      "BELIEFS": [
        { name: "Religion", impact: 8, subs: ["Christian", "Muslim", "Hindu", "Jewish", "Buddhist", "Atheist", "Agnostic", "Other"] },
        { name: "Political Party", impact: 8, subs: ["Democrat", "Republican", "Libertarian", "Green", "Independent"] },
        { name: "Political Ideology", impact: 7, subs: ["Liberal", "Conservative", "Progressive", "Centrist", "Libertarian", "Socialist"] },
        { name: "Worldview", impact: 4, subs: ["Optimist", "Pessimist", "Realist", "Idealist", "Nihilist"] }
      ],
      "GEOGRAPHY": [
        { name: "Nationality", impact: 7, subs: ["American", "British", "Chinese", "Indian", "Russian", "Brazilian", "German", "200+ more"] },
        { name: "Region", impact: 5, subs: ["Urban", "Suburban", "Rural", "Coastal", "Mountain", "Midwest", "Northeast"] },
        { name: "Language", impact: 6, subs: ["English", "Mandarin", "Spanish", "Hindi", "Arabic", "French", "Portuguese", "100+ more"] },
        { name: "Immigration", impact: 6, subs: ["Citizen", "PR", "Visa", "Undocumented", "Asylum", "Refugee"] }
      ],
      "ECONOMICS": [
        { name: "Income Level", impact: 7, subs: ["Below Poverty", "Low Income", "Middle Class", "Upper Middle", "Affluent", "Wealthy"] },
        { name: "Social Class", impact: 7, subs: ["Working", "Middle", "Upper Middle", "Upper", "Elite"] },
        { name: "Education", impact: 6, subs: ["No HS", "HS Grad", "Some College", "Bachelor's", "Master's", "PhD"] },
        { name: "Occupation", impact: 5, subs: ["Healthcare", "Tech", "Finance", "Education", "Service", "Manufacturing", "Agriculture"] },
        { name: "Employment", impact: 4, subs: ["Employed", "Unemployed", "Self-Employed", "Retired", "Student"] }
      ],
      "CULTURE": [
        { name: "Culture", impact: 6, subs: ["Western", "Eastern", "Latin", "African", "Middle Eastern", "South Asian"] },
        { name: "Food Culture", impact: 3, subs: ["American", "Chinese", "Italian", "Indian", "Mexican", "Japanese", "Thai", "Vegan"] },
        { name: "Music Taste", impact: 2, subs: ["Pop", "Rock", "Hip Hop", "Country", "Jazz", "Classical", "EDM", "Metal"] },
        { name: "Sports Team", impact: 2, subs: ["Yankees", "Celtics", "Lakers", "Cowboys", "Man Utd", "Real Madrid", "100s more"] },
        { name: "Entertainment", impact: 2, subs: ["Movies", "TV", "Gaming", "Reading", "Sports", "Travel"] }
      ],
      "LIFESTYLE": [
        { name: "Marital Status", impact: 4, subs: ["Single", "Married", "Divorced", "Widowed", "In Relationship"] },
        { name: "Family Structure", impact: 4, subs: ["Nuclear", "Single Parent", "Blended", "Extended", "Childfree"] },
        { name: "Disability", impact: 4, subs: ["Physical", "Invisible", "Chronic", "Neurodivergent", "Sensory"] },
        { name: "Health/Fitness", impact: 2, subs: ["Athletic", "Active", "Average", "Sedentary"] },
        { name: "Tech Comfort", impact: 2, subs: ["Digital Native", "Early Adopter", "Average", "Late Adopter", "Technophobe"] }
      ]
    };

    // Flatten for processing
    let allFactors = [];
    Object.entries(data).forEach(([category, factors]) => {
      factors.forEach(f => {
        allFactors.push({ ...f, category });
      });
    });

    // Calculate impact-based sizes
    const totalImpact = allFactors.reduce((sum, f) => sum + f.impact, 0);

    // Treemap layout using simple squarified algorithm
    function layoutTreemap(factors, x, y, w, h) {
      if (factors.length === 0) return [];
      
      // Sort by impact descending
      const sorted = [...factors].sort((a, b) => b.impact - a.impact);
      
      const blocks = [];
      let remaining = [...sorted];
      
      function splitRow(row, x, y, w, h, horizontal) {
        const rowImpact = row.reduce((sum, f) => sum + f.impact, 0);
        const total = horizontal ? w : h;
        const rowSize = (rowImpact / totalImpact) * (horizontal ? w : h);
        
        let offset = 0;
        row.forEach((f, i) => {
          const ratio = f.impact / rowImpact;
          const size = ratio * (horizontal ? h : w);
          
          blocks.push({
            ...f,
            x: horizontal ? x : x + offset,
            y: horizontal ? y + offset : y,
            width: horizontal ? rowSize : size,
            height: horizontal ? size : rowSize
          });
          
          offset += size;
        });
      }

      // Simple alternating horizontal/vertical split
      let currentX = x, currentY = y, currentW = w, currentH = h;
      let horizontal = w >= h;
      
      while (remaining.length > 0) {
        // Find best row
        let row = [remaining[0]];
        let i = 1;
        
        while (i < remaining.length) {
          const testRow = [...row, remaining[i]];
          const rowImpact = testRow.reduce((sum, f) => sum + f.impact, 0);
          const currentRowImpact = row.reduce((sum, f) => sum + f.impact, 0);
          
          // Aspect ratio check - simplified
          if (row.length < 4 && currentRowImpact + remaining[i].impact <= totalImpact * 0.4) {
            row.push(remaining[i]);
            i++;
          } else {
            break;
          }
        }
        
        remaining = remaining.slice(row.length);
        splitRow(row, currentX, currentY, currentW, currentH, horizontal);
        
        // Update position for next row
        const rowImpact = row.reduce((sum, f) => sum + f.impact, 0);
        const rowRatio = rowImpact / totalImpact;
        
        if (horizontal) {
          currentX += rowRatio * w;
          currentW -= rowRatio * w;
        } else {
          currentY += rowRatio * h;
          currentH -= rowRatio * h;
        }
        horizontal = !horizontal;
      }
      
      return blocks;
    }

    // Render treemap
    function render() {
      const container = document.getElementById('treemap');
      const rect = container.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      
      container.innerHTML = '';
      
      const blocks = layoutTreemap(allFactors, 0, 0, w, h);
      
      // Add category labels (simple - just show major categories)
      const categories = Object.keys(data);
      let catOffset = 0;
      
      blocks.forEach(block => {
        const el = document.createElement('div');
        el.className = `treemap-block impact-${block.impact}`;
        el.style.left = block.x + 'px';
        el.style.top = block.y + 'px';
        el.style.width = block.width + 'px';
        el.style.height = block.height + 'px';
        el.innerHTML = `
          <div class="name">${block.name}</div>
          <div class="subs">${block.subs.length} groups</div>
        `;
        el.onclick = () => showModal(block);
        container.appendChild(el);
      });
    }

    // Show modal
    function showModal(block) {
      document.getElementById('modal-title').textContent = block.name;
      document.getElementById('modal-impact').textContent = 'Impact: ' + block.impact;
      document.getElementById('modal-impact').className = 'impact-badge impact-' + block.impact;
      document.getElementById('modal-desc').textContent = `${block.subs.length} ways we divide within "${block.name}"`;
      document.getElementById('modal-subs').innerHTML = block.subs.map(s => 
        `<span class="sub-item">${s}</span>`
      ).join('');
      document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // Initial render and resize
    render();
    window.addEventListener('resize', render);
  </script>
</body>
</html>
